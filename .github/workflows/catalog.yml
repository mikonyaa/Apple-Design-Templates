name: Catalog Quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Check responsive README structure
        run: |
          if grep -En '<table|<th|<td' README.md README.ru.md; then
            echo "README product presentation must not use rigid table layouts."
            exit 1
          fi
      - name: Check local links and media
        run: |
          ruby -e 'ARGV.each { |file| File.read(file).scan(/\[[^\]]*\]\(([^)]+)\)|(?:src|href)="([^"]+)"/) { |a,b| link=a||b; next if link.start_with?("http", "#", "mailto:"); path=link.split("#",2).first; abort("Missing #{path} referenced by #{file}") unless File.exist?(path) } }' README.md README.ru.md
      - name: Check repository hygiene
        run: |
          if git ls-files | grep -E '(^|/)(\.DS_Store|Thumbs\.db|xcuserdata|DerivedData|\.build)(/|$)|\.(xcuserstate|xccheckout)$'; then
            exit 1
          fi
